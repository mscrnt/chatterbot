services:
  chatterbot:
    build: .
    stdin_open: true
    tty: true
    environment:
      - TWITCH_BOT_NICK=${TWITCH_BOT_NICK}
      - TWITCH_OAUTH_TOKEN=${TWITCH_OAUTH_TOKEN}
      - TWITCH_CHANNEL=${TWITCH_CHANNEL}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - OLLAMA_HOST=${OLLAMA_HOST:-192.168.69.229}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:9b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_EMBED_DIM=${OLLAMA_EMBED_DIM:-768}
      - OLLAMA_MOD_MODEL=${OLLAMA_MOD_MODEL:-}
      - OBS_ENABLED=${OBS_ENABLED:-false}
      - OBS_HOST=${OBS_HOST:-localhost}
      - OBS_PORT=${OBS_PORT:-4455}
      - OBS_PASSWORD=${OBS_PASSWORD:-}
      - STREAMELEMENTS_ENABLED=${STREAMELEMENTS_ENABLED:-false}
      - STREAMELEMENTS_JWT=${STREAMELEMENTS_JWT}
      - STREAMELEMENTS_CHANNEL_ID=${STREAMELEMENTS_CHANNEL_ID}
      - DASHBOARD_HOST=${DASHBOARD_HOST:-0.0.0.0}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8765}
      - DASHBOARD_BASIC_AUTH_USER=${DASHBOARD_BASIC_AUTH_USER}
      - DASHBOARD_BASIC_AUTH_PASS=${DASHBOARD_BASIC_AUTH_PASS}
      - DB_PATH=${DB_PATH:-/app/data/chatters.db}
      - SUMMARIZE_AFTER_MESSAGES=${SUMMARIZE_AFTER_MESSAGES:-20}
      - SUMMARIZE_IDLE_MINUTES=${SUMMARIZE_IDLE_MINUTES:-10}
      - IDLE_SWEEP_INTERVAL_SECONDS=${IDLE_SWEEP_INTERVAL_SECONDS:-60}
      - TOPICS_INTERVAL_MINUTES=${TOPICS_INTERVAL_MINUTES:-5}
      - TOPICS_MAX_MESSAGES=${TOPICS_MAX_MESSAGES:-200}
      - MOD_MODE_ENABLED=${MOD_MODE_ENABLED:-false}
      - MOD_REVIEW_INTERVAL_MINUTES=${MOD_REVIEW_INTERVAL_MINUTES:-5}
      - MOD_REVIEW_MAX_MESSAGES=${MOD_REVIEW_MAX_MESSAGES:-100}
      - RUN_MODE=${RUN_MODE:-bot}
    ports:
      - "${DASHBOARD_PORT:-8765}:${DASHBOARD_PORT:-8765}"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    restart: unless-stopped
    command: ["${RUN_MODE:-bot}"]
