{% extends "base.html" %}
{% block title %}Live chat · chatterbot{% endblock %}
{% block content %}
<div class="space-y-3">
  <header class="flex items-baseline justify-between gap-2">
    <h1 class="text-xl sm:text-2xl font-semibold inline-flex items-center gap-2">
      <i class="fa-solid fa-tower-broadcast text-accent"></i> Live chat
    </h1>
    <span class="text-xs text-muted">last {{ limit }} · refreshes every 2s</span>
  </header>
  <div id="live-feed"
       class="rounded-xl border border-subtle bg-surface px-3 py-2 text-sm space-y-0.5 shadow-sm"
       hx-get="/live?partial=1&limit={{ limit }}"
       hx-trigger="every 2s"
       hx-swap="innerHTML">
    {% include "partials/live_rows.html" %}
  </div>
</div>
{% endblock %}
