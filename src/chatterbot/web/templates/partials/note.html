<div id="note-{{ note.id }}"
     class="rounded-xl border border-subtle bg-surface p-3 group hover:bg-surface-raised transition-all duration-150 ease-out">
  <div class="flex items-start justify-between gap-2">
    <p class="flex-1 leading-relaxed text-primary">{{ note.text }}</p>
    <div class="flex gap-1 shrink-0">
      <button class="tap inline-flex items-center justify-center px-2 text-xs rounded bg-surface-raised hover:bg-subtle text-muted hover:text-primary"
              hx-get="/modals/note/{{ note.id }}/edit"
              hx-target="#modal-root"
              aria-label="edit">
        <i class="fa-solid fa-pen-to-square"></i>
      </button>
      <button class="tap inline-flex items-center justify-center px-2 text-xs rounded bg-danger/15 hover:bg-danger/25 text-danger"
              hx-get="/modals/note/{{ note.id }}/delete"
              hx-target="#modal-root"
              aria-label="delete">
        <i class="fa-solid fa-trash"></i>
      </button>
    </div>
  </div>
  <p class="text-xs text-muted mt-1">{{ note.ts | short_ts }}</p>
</div>
