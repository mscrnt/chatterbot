{% extends "base.html" %}
{% block title %}Topics · chatterbot{% endblock %}
{% block content %}
<div class="space-y-3">
  <header class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2">
    <div>
      <h1 class="text-xl sm:text-2xl font-semibold inline-flex items-center gap-2">
        <i class="fa-solid fa-comments text-accent"></i> Topics
      </h1>
      <p class="text-xs text-muted mt-1">
        Recurring conversations clustered across snapshots.
        Click a thread to pull it back up.
      </p>
    </div>

    <div class="flex flex-col sm:flex-row gap-2 sm:items-end">
      <button type="button"
              class="tap inline-flex items-center justify-center gap-2 px-3 rounded bg-surface-raised hover:bg-subtle text-primary text-sm self-end"
              hx-post="/topics/mark-read"
              hx-target="#topics-body"
              hx-swap="outerHTML"
              title="Clear NEW badges on every thread">
        <i class="fa-solid fa-check-double text-xs"></i> Mark all read
      </button>
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Status</label>
        <select name="status"
                class="tap bg-surface border border-subtle rounded px-3 text-base text-primary focus:outline-none focus:ring-2 focus:ring-accent transition-all duration-150 ease-out"
                hx-get="/topics?partial=1"
                hx-target="#topics-body" hx-swap="outerHTML"
                hx-include="[name='q']"
                hx-trigger="change">
          <option value="all"      {% if status=='all' %}selected{% endif %}>all</option>
          <option value="active"   {% if status=='active' %}selected{% endif %}>active (last hr)</option>
          <option value="dormant"  {% if status=='dormant' %}selected{% endif %}>dormant (last 24h)</option>
          <option value="archived" {% if status=='archived' %}selected{% endif %}>archived</option>
        </select>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider text-muted mb-1">Search</label>
        <input type="search" name="q" value="{{ q }}" placeholder="title or driver…"
               class="tap bg-surface border border-subtle rounded px-3 text-base text-primary placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-accent"
               hx-get="/topics?partial=1"
               hx-trigger="keyup changed delay:200ms, search"
               hx-target="#topics-body" hx-swap="outerHTML"
               hx-include="[name='status']">
      </div>
    </div>
  </header>

  {% include "partials/topics_body.html" %}
</div>
{% endblock %}
